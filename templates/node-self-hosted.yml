name: Node Self-Hosted CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: node-local-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  node:
    runs-on: [self-hosted, linux, x64, node]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present
