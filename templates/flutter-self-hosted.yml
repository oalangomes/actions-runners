name: Flutter Self-Hosted CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-local-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  flutter:
    runs-on: [self-hosted, linux, x64, flutter]
    steps:
      - uses: actions/checkout@v4
      - name: Flutter doctor
        run: flutter doctor
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Build APK
        if: github.event_name == 'workflow_dispatch'
        run: flutter build apk --release
      - name: Upload APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
